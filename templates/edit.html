<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container">

<h2>Update Student</h2>

<form method="POST" action="/update/{{ student.id }}">
    <input type="text" value="ID: {{ student.id }}" disabled><br><br>

    <input type="text" name="name" value="{{ student.name }}" placeholder="Name"><br><br>

    <input type="text" name="course" value="{{ student.course }}" placeholder="Course"><br><br>

    <button type="submit">Update Student</button>
</form>

</div>

</body>
</html>
